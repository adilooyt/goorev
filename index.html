  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#22c55e;
      --accent2:#16a34a;
      --btn:#2563eb;
      --btn-sec:#06b6d4;
      --btnh:#1d4ed8;
      --radius:18px;
      --shadow:0 12px 32px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 550px at 50% -120px,#1f2937 0%,transparent 62%),
        var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(680px,100%);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.12);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px 18px 20px;
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.35rem,5vw,2.05rem);
      line-height:1.25;
      letter-spacing:.2px;
    }
    #shopNameSpan{
      color:#facc15;
    }
    .sub{
      margin:0 0 12px;
      font-size:clamp(.96rem,3.8vw,1.08rem);
      color:var(--muted);
    }
    .count{
      margin:4px 0 10px;
      font-size:clamp(1rem,3.8vw,1.18rem);
      font-weight:700;
      color:#e2e8f0;
    }
    .progress{
      width:100%;
      height:12px;
      background:rgba(255,255,255,.12);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      margin:10px 0 16px;
    }
    .bar{
      width:100%;
      height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transform-origin:left center;
      transform:scaleX(1);
      transition:transform linear;
    }
    .btn{
      width:100%;
      border:0;
      border-radius:12px;
      min-height:50px;
      padding:13px 16px;
      font-size:1.01rem;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg, var(--btn) 0%, #3b82f6 50%, var(--btn-sec) 100%);
      background-size:200% 200%;
      animation:buttonShimmer 3s ease infinite;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }
    .btn:active{transform:translateY(1px)}
    .btn:hover{filter:brightness(.92);transform:scale(1.01)}
    @keyframes buttonShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .brand{
      margin-top:20px;
      padding:8px 16px;
      background:linear-gradient(135deg, #facc15 0%, #fef08a 50%, #facc15 100%);
      background-size:200% 200%;
      animation:bannerShimmer 3s ease infinite;
      color:#0f172a;
      font-weight:700;
      font-size:.82rem;
      border-radius:8px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      letter-spacing:.5px;
      box-shadow:0 4px 12px rgba(250,204,21,.2);
    }
    @keyframes bannerShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .brand a{
      color:#0f172a;
      text-decoration:none;
      border-bottom:1px dashed rgba(15,23,42,.5);
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .ig{width:14px;height:14px;display:inline-block}
    .tiny{
      margin-top:9px;
      color:#94a3b8;
      font-size:.78rem;
    }
    /* AI Review Section - simplified */
    .divider {
      border: 0;
      border-top: 1px solid rgba(255,255,255,.12);
      margin: 22px 0 18px;
    }
    .ai-section {
      text-align: center;
    }
    .ai-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e2e8f0;
      margin: 0 0 14px;
      letter-spacing: .3px;
    }
    .ai-textarea {
      width: 100%;
      background: rgba(0, 0, 0, .25);
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: .95rem;
      padding: 12px 14px;
      outline: none;
      resize: vertical;
      line-height: 1.6;
      font-family: inherit;
      margin-bottom: 12px;
      min-height: 90px;
    }
    .ai-textarea:focus {
      border-color: var(--accent);
    }
    .ai-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #94a3b8;
      font-size: .9rem;
      padding: 18px 0;
    }
    .ai-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-label {
      font-size: .78rem;
      color: #64748b;
      margin-bottom: 8px;
      text-align: left;
    }

        "SP112": { shop: "Shop 112", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP112" },
        "SP113": { shop: "Shop 113", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP113" },
        "SP114": { shop: "Shop 114", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP114" },
        "SP115": { shop: "Shop 115", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP115" },
        "SP116": { shop: "Shop 116", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP116" },
        "SP117": { shop: "Shop 117", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP117" },
        "SP118": { shop: "Shop 118", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP118" },
        "SP119": { shop: "Shop 119", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP119" },
        "SP120": { shop: "Shop 120", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP120" }
      };

      // =========================
      // PARAM READ
      // =========================
      const qs = new URLSearchParams(window.location.search);
      const id = (qs.get("id") || "").trim();
      const requestedShop = (qs.get("shop") || "").trim();
      const requestedLink = (qs.get("link") || "").trim();

      // URL safety
      function normalizeAllowedReviewUrl(v) {
        if (!v) return null;
        try {
          const u = new URL(v);
          const host = u.hostname.toLowerCase();
          const path = u.pathname.toLowerCase();
          if (u.protocol !== "https:") return null;
          if (!ALLOWED_REVIEW_HOSTS.has(host)) return null;
          if (host === "search.google.com") {
            return path.startsWith("/local/writereview") ? u.toString() : null;
          }
          if (host === "google.com" || host === "www.google.com") {
            return path === "/maps" || path.startsWith("/maps/") ? u.toString() : null;
          }
          if (host === "maps.google.com") return u.toString();
          if (host === "maps.app.goo.gl" || host === "g.page") return u.toString();
          return null;
        } catch (_) {
          return null;
        }
      }

      let shopName = DEFAULT_SHOP_NAME;
      let reviewUrl = DEFAULT_REVIEW_URL;
      let resolutionSource = "default";

      let themeColor = null;
      let logo = null;
      let customTags = null;
      let geminiApiKeys = null; // can be array of 3 keys for fallback
      let category = null;
      let note = null;

      // Prefer controlled id-based lookup first.
      if (id && SHOP_LOOKUP[id]) {
        shopName = SHOP_LOOKUP[id].shop || shopName;
        reviewUrl = normalizeAllowedReviewUrl(SHOP_LOOKUP[id].link) || reviewUrl;
        logo = SHOP_LOOKUP[id].logo || null;
        themeColor = SHOP_LOOKUP[id].themeColor || null;
        customTags = SHOP_LOOKUP[id].tags || null;
        // Support a single key (string) or an array of up to 3 keys for fallback
        const rawKey = SHOP_LOOKUP[id].geminiKey || null;
        if (rawKey) {
          geminiApiKeys = Array.isArray(rawKey) ? rawKey.filter(Boolean) : [rawKey];
        }
        category = SHOP_LOOKUP[id].category || null;
        note = SHOP_LOOKUP[id].note || null;
        resolutionSource = "id_lookup";
      } else {
        if (requestedShop) shopName = requestedShop;
        const allowedQueryLink = normalizeAllowedReviewUrl(requestedLink);
        if (allowedQueryLink) {
          reviewUrl = allowedQueryLink;
          resolutionSource = "query_link";
        } else if (requestedLink) {
          resolutionSource = "blocked_link_fallback";
        }
      }

      // =========================
      // UI
      // =========================
      const igLink = document.getElementById("igLink");
      const logoContainer = document.getElementById("logoContainer");
      const shopLogo = document.getElementById("shopLogo");

      const shopNameSpan = document.getElementById("shopNameSpan");
      if (shopNameSpan) shopNameSpan.textContent = shopName;

      // Apply dynamic branding
      if (logo) {
        shopLogo.src = logo;
        logoContainer.style.display = "block";
      }
      if (themeColor) {
        document.documentElement.style.setProperty('--accent', themeColor);
        document.documentElement.style.setProperty('--accent2', themeColor);
        document.documentElement.style.setProperty('--btn', themeColor);
        document.documentElement.style.setProperty('--btn-sec', themeColor);
        document.documentElement.style.setProperty('--btnh', themeColor);
      }

      // =========================
      // ANALYTICS — GA4
      // =========================
      function trackEvent(eventName, params) {
        if (typeof gtag !== 'function') return;
        gtag('event', eventName, params || {});
      }

      // Track page view with shop context
      trackEvent('shop_page_view', { shop_id: id || 'unknown', shop_name: shopName });

      // =========================
      // AI REVIEW — AUTO GENERATE ON PAGE LOAD
      // =========================
      const generatedReviewArea = document.getElementById("generatedReview");
      const aiLoading = document.getElementById("aiLoading");
      const aiReviewBox = document.getElementById("aiReviewBox");
      const copyBtn = document.getElementById("copyReviewBtn");
      const copyBtnText = document.getElementById("copyBtnText");

      // Local Review Generator (fallback when no API key)
      function generateLocalReview(shop, catg, shopNote) {
        const useHinglish = Math.random() < 0.4;

        const hinglishReviews = {
          "university": [
            `${shop} ekdum mast jagah hai, campus bahut sundar hai aur atmosphere kaafi inspiring. Highly recommend!`,
            `Yaar sach mein ${shop} bohot achi university hai, yahan ki vibe alag hi level ki hai!`,
            `${shop} visit kiya tha, zabardast experience tha — campus, faculty sab kuch top class.`
          ],
          "college": [
            `${shop} mein padhai ka mahaul bahut achi hai, faculty bhi kaafi helpful. Must visit!`,
            `Bhai ${shop} ekdum solid college hai, yahan ki education quality really good hai.`
          ],
          "restaurant": [
            `${shop} ka khana sach mein zabardast tha, aur service bhi bahut fast thi. Jaroor aana chahiye!`,
            `Yaar ${shop} mein jo khaya, ekdum mast tha! Bilkul paisa vasool.`
          ],
          "cafe": [
            `${shop} ki coffee bahut achi hai aur vibe bhi kaafi cozy. Dobara zaroor aaunga!`,
            `Bhai ${shop} ekdum chill jagah hai, chai-coffee sab mast. Highly recommend yaar!`
          ]
        };

        const hinglishGeneric = [
          `${shop} bahut achi jagah hai, sach mein ekdum mast experience tha. Zaroor visit karo!`,
          `Yaar ${shop} really good hai — staff friendly, service fast, bilkul recommend karunga!`,
          `${shop} se bahut khush hua, zabardast service aur kaafi achi jagah. Must visit!`,
          `Bhai ${shop} ekdum solid hai, jo bhi jaaye wapas zaroor aayega. Top class!`
        ];

        const englishReviews = {
          "university": [
            `Honestly one of the best campuses I've visited — ${shop} has an incredible atmosphere and rich history.`,
            `Really loved the vibe at ${shop}, the campus is beautiful and the academic energy is just different.`,
            `Tbh ${shop} exceeded my expectations, stunning campus and world-class faculty. Highly recommend!`
          ],
          "college": [
            `Super impressed by ${shop} — great learning environment and really helpful faculty.`,
            `Honestly ${shop} is a solid institution, the atmosphere is great and the teaching quality is top notch.`
          ],
          "restaurant": [
            `Honestly the food at ${shop} was incredible, and the service was super fast too. 100% coming back!`,
            `Really loved dining at ${shop} — the flavors were amazing and the staff were so friendly.`
          ],
          "cafe": [
            `Tbh ${shop} is my new favorite spot, the coffee is amazing and the vibe is super cozy!`,
            `Really loved the atmosphere at ${shop} — great drinks, chill vibes, and friendly staff.`
          ]
        };

        const englishGeneric = [
          `Honestly ${shop} was such a great experience, really loved the whole vibe there!`,
          `Super impressed by ${shop} — friendly staff, great service, and an awesome atmosphere overall.`,
          `Tbh I wasn't expecting much but ${shop} really blew me away. Highly recommend!`,
          `Really loved my visit to ${shop}, everything was top notch and the staff were super welcoming.`,
          `${shop} is genuinely one of the best places I've been to — will definitely be coming back!`
        ];

        const catLower = (catg || "").toLowerCase().trim();

        if (useHinglish) {
          const pool = hinglishReviews[catLower] || hinglishGeneric;
          return pool[Math.floor(Math.random() * pool.length)];
        } else {
          const pool = englishReviews[catLower] || englishGeneric;
          return pool[Math.floor(Math.random() * pool.length)];
        }
      }

      // Gemini API Review Generator (multi-key fallback)
      async function generateGeminiReview(apiKeys, shop, catg, shopNote) {
        let context = `Place: ${shop}`;
        if (catg) context += `\nType: ${catg}`;
        if (shopNote) context += `\nAbout: ${shopNote}`;

        // Randomly decide style — 40% chance of Hinglish
        const useHinglish = Math.random() < 0.4;

        const prompt = useHinglish
          ? `Write a short Google review for this place in Hinglish (mix of Hindi and English, like how young Indians text):
${context}

Rules:
- 1 to 2 sentences only
- Sound like a real person casually texting, not formal
- Mix Hindi words naturally like: bahut, achi, mast, ekdum, sach mein, bhai, yaar, must visit, kaafi, zabardast, bilkul
- No star ratings mentioned
- No quotes or brackets
- Keep it genuine and fun`
          : `Write a short Google review for this place:
${context}

Rules:
- 1 to 2 sentences only
- Sound like a real person, casual and warm — not corporate or robotic
- Use natural imperfections like "honestly", "tbh", "really", "super", "loved it"
- Vary sentence structure, don't start with the shop name
- No star ratings mentioned
- No quotes or brackets`;

        for (let i = 0; i < apiKeys.length; i++) {
          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeys[i]}`;
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 120, temperature: 1.1 }
              })
            });
            if (!res.ok) {
              console.warn(`Key ${i + 1} failed (${res.status}), trying next…`);
              continue;
            }
            const data = await res.json();
            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) return text.trim();
          } catch (err) {
            console.warn(`Key ${i + 1} error:`, err.message);
          }
        }
        throw new Error('All API keys failed');
      }

      // Auto-generate on page load
      async function autoGenerateReview() {
        aiLoading.style.display = "flex";
        aiReviewBox.style.display = "none";
        try {
          let review = "";
          if (geminiApiKeys && geminiApiKeys.length > 0) {
            review = await generateGeminiReview(geminiApiKeys, shopName, category, note);
          } else {
            review = generateLocalReview(shopName, category, note);
          }
          generatedReviewArea.value = review;
        } catch (err) {
          console.error("AI generation failed, using local fallback:", err);
          generatedReviewArea.value = generateLocalReview(shopName, category, note);
        } finally {
          aiLoading.style.display = "none";
          aiReviewBox.style.display = "block";
        }
      }

      // Start generating immediately
      autoGenerateReview();

      // Refresh button
      document.getElementById("refreshReviewBtn").addEventListener("click", () => {
        trackEvent('review_refreshed', { shop_id: id || 'unknown' });
        autoGenerateReview();
      });

      // Skip button tracking
      document.getElementById("skipToReviewBtn").addEventListener("click", () => {
        trackEvent('skip_to_review', { shop_id: id || 'unknown', shop_name: shopName });
      });

      // Copy & Redirect
      copyBtn.addEventListener("click", () => {
        const text = generatedReviewArea.value.trim();
        if (!text) return;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(onCopySuccess, onCopyError);
        } else {
          try {
            generatedReviewArea.select();
            document.execCommand('copy') ? onCopySuccess() : onCopyError();
          } catch (_) { onCopyError(); }
        }
      });

      function onCopySuccess() {
        copyBtnText.textContent = "Copied! Opening Google Reviews…";
        copyBtn.style.background = "linear-gradient(135deg,#15803d 0%,#166534 100%)";

        trackEvent('review_copied', {
          shop_id:   id || 'unknown',
          shop_name: shopName
        });

        window.location.href = reviewUrl;
      }

      function onCopyError() {
        copyBtnText.textContent = "Failed to copy — please copy manually!";
        setTimeout(() => { copyBtnText.textContent = "Copy & Open Google Reviews"; }, 2500);
      }

      // =========================
      // SKIP BUTTON — go directly to Google Reviews
      // =========================
      document.getElementById("skipToReviewBtn").href = reviewUrl;

    })();
  </script>
