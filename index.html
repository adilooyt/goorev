  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#22c55e;
      --accent2:#16a34a;
      --btn:#2563eb;
      --btn-sec:#06b6d4;
      --btnh:#1d4ed8;
      --radius:18px;
      --shadow:0 12px 32px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 550px at 50% -120px,#1f2937 0%,transparent 62%),
        var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(680px,100%);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.12);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px 18px 20px;
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.35rem,5vw,2.05rem);
      line-height:1.25;
      letter-spacing:.2px;
    }
    #shopNameSpan{
      color:#facc15;
    }
    .sub{
      margin:0 0 12px;
      font-size:clamp(.96rem,3.8vw,1.08rem);
      color:var(--muted);
    }
    .count{
      margin:4px 0 10px;
      font-size:clamp(1rem,3.8vw,1.18rem);
      font-weight:700;
      color:#e2e8f0;
    }
    .progress{
      width:100%;
      height:12px;
      background:rgba(255,255,255,.12);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      margin:10px 0 16px;
    }
    .bar{
      width:100%;
      height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transform-origin:left center;
      transform:scaleX(1);
      transition:transform linear;
    }
    .btn{
      width:100%;
      border:0;
      border-radius:12px;
      min-height:50px;
      padding:13px 16px;
      font-size:1.01rem;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg, var(--btn) 0%, #3b82f6 50%, var(--btn-sec) 100%);
      background-size:200% 200%;
      animation:buttonShimmer 3s ease infinite;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }
    .btn:active{transform:translateY(1px)}
    .btn:hover{filter:brightness(.92);transform:scale(1.01)}
    @keyframes buttonShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .brand{
      margin-top:20px;
      padding:8px 16px;
      background:linear-gradient(135deg, #facc15 0%, #fef08a 50%, #facc15 100%);
      background-size:200% 200%;
      animation:bannerShimmer 3s ease infinite;
      color:#0f172a;
      font-weight:700;
      font-size:.82rem;
      border-radius:8px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      letter-spacing:.5px;
      box-shadow:0 4px 12px rgba(250,204,21,.2);
    }
    @keyframes bannerShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .brand a{
      color:#0f172a;
      text-decoration:none;
      border-bottom:1px dashed rgba(15,23,42,.5);
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .ig{width:14px;height:14px;display:inline-block}
    .tiny{
      margin-top:9px;
      color:#94a3b8;
      font-size:.78rem;
    }
    /* AI Review Section - simplified */
    .divider {
      border: 0;
      border-top: 1px solid rgba(255,255,255,.12);
      margin: 22px 0 18px;
    }
    .ai-section {
      text-align: center;
    }
    .ai-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e2e8f0;
      margin: 0 0 14px;
      letter-spacing: .3px;
    }
    .ai-textarea {
      width: 100%;
      background: rgba(0, 0, 0, .25);
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: .95rem;
      padding: 12px 14px;
      outline: none;
      resize: vertical;
      line-height: 1.6;
      font-family: inherit;
      margin-bottom: 12px;
      min-height: 90px;
    }
    .ai-textarea:focus {
      border-color: var(--accent);
    }
    .ai-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #94a3b8;
      font-size: .9rem;
      padding: 18px 0;
    }
    .ai-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-label {
      font-size: .78rem;
      color: #64748b;
      margin-bottom: 8px;
      text-align: left;
    }
  </style>
</head>

 <p class="sub">Leave a quick review &mdash; it means a lot &#x1F64F;</p>

          </button>
        </div>
      </div>

      <div style="text-align:center;margin-top:14px;">

          Skip AI &amp; write manually →
        </a>
      </div>
    </section>

    <div class="divider"></div>

        ADILOOFM

    </div>

          if (host === "search.google.com") {

      // Gemini API Review Generator (multi-key fallback)
      async function generateGeminiReview(apiKeys, shop, catg, shopNote) {
        if (SECURE_PROXY_URL) {
          try {
            const url = new URL(SECURE_PROXY_URL);
            url.searchParams.append("shop", shop);
            if (catg) url.searchParams.append("category", catg);
            if (shopNote) url.searchParams.append("note", shopNote);
            url.searchParams.append("_", Date.now().toString()); // Cache-buster

            const res = await fetch(url.toString(), {
              method: 'GET',
              mode: 'cors'
            });
            if (res.ok) {
              const text = await res.text();
              if (text && text.trim() && !text.startsWith("Error:") && !text.startsWith("Proxy Server Error:")) {
                return text.trim();
              } else if (text) {
                console.warn("Proxy returned error:", text);
              }
            } else {
              console.warn(`Proxy request failed with status: ${res.status}`);
            }
          } catch (err) {
            console.warn("Failed to generate review via secure proxy:", err);
          }
          console.log("Attempting direct key fallback...");
        }

        let context = `Place: ${shop}`;
        if (catg) context += `\nType: ${catg}`;
        if (shopNote) context += `\nAbout: ${shopNote}`;

        // Randomly decide style — 40% chance of Hinglish
        const useHinglish = Math.random() < 0.4;

        const prompt = useHinglish
          ? `Write a short Google review for this place in Hinglish (mix of Hindi and English, like how young Indians text):
${context}

Rules:
- 1 to 2 sentences only
- Sound like a real person casually texting, not formal
- Mix Hindi words naturally like: bahut, achi, mast, ekdum, sach mein, bhai, yaar, must visit, kaafi, zabardast, bilkul
- No star ratings mentioned
- No quotes or brackets
- Keep it genuine and fun`
          : `Write a short Google review for this place:
${context}

Rules:
- 1 to 2 sentences only
- Sound like a real person, casual and warm — not corporate or robotic
- Use natural imperfections like "honestly", "tbh", "really", "super", "loved it"
- Vary sentence structure, don't start with the shop name
- No star ratings mentioned
- No quotes or brackets`;

        const shuffled = [...apiKeys].sort(() => Math.random() - 0.5);
        for (let i = 0; i < shuffled.length; i++) {
          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${shuffled[i]}`;
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 120, temperature: 1.1 }
              })
            });
            if (!res.ok) {
              console.warn(`Key ${i + 1} failed (${res.status}), trying next…`);
              continue;
            }
            const data = await res.json();
            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) return text.trim();
          } catch (err) {
            console.warn(`Key ${i + 1} error:`, err.message);
          }
        }
        throw new Error('All API keys failed');
      }

      // Auto-generate on page load
      async function autoGenerateReview() {
        aiLoading.style.display = "flex";
        aiReviewBox.style.display = "none";
        try {
          let review = "";
          if (geminiApiKeys && geminiApiKeys.length > 0) {
            review = await generateGeminiReview(geminiApiKeys, shopName, category, note);
          } else {
            review = generateLocalReview(shopName, category, note);
          }
          generatedReviewArea.value = review;
        } catch (err) {
          console.error("AI generation failed, using local fallback:", err);
          generatedReviewArea.value = generateLocalReview(shopName, category, note);
          // Show subtle fallback indicator to user
          const label = document.querySelector('.ai-label');
          if (label) label.textContent = 'Tap to edit before copying (auto-suggested):';
        } finally {
          aiLoading.style.display = "none";
          aiReviewBox.style.display = "block";
        }
      }

      // Start generating immediately
      autoGenerateReview();

      // Refresh button
      document.getElementById("refreshReviewBtn").addEventListener("click", () => {
        trackEvent('review_refreshed', { shop_id: id || 'unknown' });
        autoGenerateReview();
      });

      // Skip button tracking — use beacon transport so event fires before navigation
      document.getElementById("skipToReviewBtn").addEventListener("click", () => {
        trackEvent('skip_to_review', { shop_id: id || 'unknown', shop_name: shopName, transport_type: 'beacon' });
      });

      // Copy & Redirect
      copyBtn.addEventListener("click", () => {
        const text = generatedReviewArea.value.trim();
        if (!text) return;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(onCopySuccess, onCopyError);
        } else {
          try {
            generatedReviewArea.select();
            document.execCommand('copy') ? onCopySuccess() : onCopyError();
          } catch (_) { onCopyError(); }
        }
      });

      function onCopySuccess() {
        copyBtnText.textContent = "Copied! Opening Google Reviews…";
        copyBtn.style.background = "linear-gradient(135deg,#15803d 0%,#166534 100%)";

        trackEvent('review_copied', {
          shop_id:   id || 'unknown',
          shop_name: shopName
        });

        window.location.href = reviewUrl;
      }

      function onCopyError() {
        copyBtnText.textContent = "Failed to copy — please copy manually!";
        setTimeout(() => { copyBtnText.textContent = "Copy & Open Google Reviews"; }, 2500);
      }

      // =========================
      // SKIP BUTTON — go directly to Google Reviews
      // =========================
      document.getElementById("skipToReviewBtn").href = reviewUrl;

    })();
