      --btn:#2563eb;

      --radius:18px;
      --shadow:0 12px 32px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 550px at 50% -120px,#1f2937 0%,transparent 62%),
        var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(680px,100%);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.12);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px 18px 20px;
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.35rem,5vw,2.05rem);
      line-height:1.25;
      letter-spacing:.2px;
    }
    .sub{
      margin:0 0 12px;
      font-size:clamp(.96rem,3.8vw,1.08rem);
      color:var(--muted);
    }
    .count{
      margin:4px 0 10px;
      font-size:clamp(1rem,3.8vw,1.18rem);
      font-weight:700;
      color:#e2e8f0;
    }
    .progress{
      width:100%;
      height:12px;
      background:rgba(255,255,255,.12);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      margin:10px 0 16px;
    }
    .bar{
      width:100%;
      height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transform-origin:left center;
      transform:scaleX(1);
      transition:transform linear;
    }
    .btn{
      width:100%;
      border:0;
      border-radius:12px;
      min-height:50px;
      padding:13px 16px;
      font-size:1.01rem;
      font-weight:700;
      color:#fff;
      background:var(--btn);
      cursor:pointer;
    }
    .btn:active{transform:translateY(1px)}
    .btn:hover{background:var(--btnh);filter:brightness(.92)}
    .brand{
      margin-top:16px;
      color:var(--muted);
      font-size:.93rem;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }
    .brand a{
      color:#c7d2fe;
      text-decoration:none;
      border-bottom:1px dashed rgba(199,210,254,.55);
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .ig{width:15px;height:15px;display:inline-block}
    .tiny{
      margin-top:9px;
      color:#94a3b8;
      font-size:.78rem;
    }

      const requestedLink = (qs.get("link") || "").trim();

      // URL safety
      function normalizeAllowedReviewUrl(v) {
        if (!v) return null;
        try {
          const u = new URL(v);
          const host = u.hostname.toLowerCase();
          const path = u.pathname.toLowerCase();
          if (u.protocol !== "https:") return null;
          if (!ALLOWED_REVIEW_HOSTS.has(host)) return null;
          if (host === "search.google.com") {
            return path.startsWith("/local/writereview") ? u.toString() : null;
          }
          if (host === "google.com" || host === "www.google.com") {
            return path === "/maps" || path.startsWith("/maps/") ? u.toString() : null;
          }
          if (host === "maps.google.com") return u.toString();
          if (host === "maps.app.goo.gl" || host === "g.page") return u.toString();
          return null;
        } catch (_) {
          return null;
        }
      }

        themeColor = SHOP_LOOKUP[id].themeColor || null;
        resolutionSource = "id_lookup";

        const allowedQueryLink = normalizeAllowedReviewUrl(requestedLink);
        if (allowedQueryLink) {

          resolutionSource = "query_link";
        } else if (requestedLink) {
          resolutionSource = "blocked_link_fallback";

      }

      // Apply dynamic branding
      if (logo) {
        shopLogo.src = logo;
        logoContainer.style.display = "block";
      }
      if (themeColor) {
        document.documentElement.style.setProperty('--accent', themeColor);
        document.documentElement.style.setProperty('--accent2', themeColor);
        document.documentElement.style.setProperty('--btn', themeColor);
        document.documentElement.style.setProperty('--btnh', themeColor);
      }

      // progress animation
      bar.style.transitionDuration = "0s";
      bar.style.transform = "scaleX(1)";
      bar.offsetHeight; // force reflow
      bar.style.transitionDuration = `${REDIRECT_SECONDS}s`;
      bar.style.transform = "scaleX(0)";

      let secondsLeft = Math.ceil(REDIRECT_SECONDS);
      countText.textContent = `Redirecting to Google Reviews in ${secondsLeft}â¦`;

      const countdownTimer = setInterval(() => {
        secondsLeft -= 1;
        if (secondsLeft > 0) {
          countText.textContent = `Redirecting to Google Reviews in ${secondsLeft}â¦`;
        } else {
          countText.textContent = "Redirecting nowâ¦";
          clearInterval(countdownTimer);
        }
      }, 1000);

      // =========================
      // ANALYTICS
      // =========================
      function trackEvent(payload) {
        if (!ANALYTICS_WEBHOOK) return;

        const params = new URLSearchParams({
          timestamp:   new Date().toISOString(),
          event:       payload.event || "",
          shopId:      id || "",
          resolution:  resolutionSource,
          source:      payload.source || "",
          targetHost:  payload.targetHost || "",
          originHint:  window.location.origin
        });

        const url = ANALYTICS_WEBHOOK + "?" + params.toString();

        // fire-and-forget GET request
        try {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(url);
            return;
          }
        } catch (_) {}

        fetch(url, { mode: "no-cors", keepalive: true }).catch(() => {});
      }

      // =========================
      // REDIRECT FLOW
      // =========================
      let redirected = false;
      function redirectNow(source) {
        if (redirected) return;
        redirected = true;

        clearInterval(countdownTimer);

        trackEvent({
          event: "shop_redirect",
          targetHost: new URL(reviewUrl).hostname,
          source: source || "auto"
        });

        // tiny delay helps fire analytics request first
        setTimeout(() => {
          window.location.href = reviewUrl;
        }, 120);
      }

      const autoTimer = setTimeout(() => redirectNow("auto"), REDIRECT_SECONDS * 1000);
      skipBtn.addEventListener("click", () => redirectNow("skip_button"));
      window.addEventListener("pagehide", () => clearTimeout(autoTimer));

      // =========================
      // INSTAGRAM LINK (deeplink + fallback)
      // =========================
      igLink.addEventListener("click", function (e) {
        e.preventDefault();

        trackEvent({
          event: "profile_click",
          targetHost: "instagram.com",
          source: "instagram_link"
        });

        const appUrl = "instagram://user?username=adiloofm";
        const webUrl = "https://instagram.com/adiloofm";

        // attempt app
        window.location.href = appUrl;

        // fallback to web
        setTimeout(() => {
          window.open(webUrl, "_blank", "noopener,noreferrer");
        }, 800);
      });
    })();
  </script>
</body>
</html>
