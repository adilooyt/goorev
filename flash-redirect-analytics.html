<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Redirecting to Google Reviews…</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#22c55e;
      --accent2:#16a34a;
      --btn:#2563eb;
      --btnh:#1d4ed8;
      --radius:18px;
      --shadow:0 12px 32px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 550px at 50% -120px,#1f2937 0%,transparent 62%),
        var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(680px,100%);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.12);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px 18px 20px;
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(1.35rem,5vw,2.05rem);
      line-height:1.25;
      letter-spacing:.2px;
    }
    .sub{
      margin:0 0 12px;
      font-size:clamp(.96rem,3.8vw,1.08rem);
      color:var(--muted);
    }
    .count{
      margin:4px 0 10px;
      font-size:clamp(1rem,3.8vw,1.18rem);
      font-weight:700;
      color:#e2e8f0;
    }
    .progress{
      width:100%;
      height:12px;
      background:rgba(255,255,255,.12);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      margin:10px 0 16px;
    }
    .bar{
      width:100%;
      height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transform-origin:left center;
      transform:scaleX(1);
      transition:transform linear;
    }
    .btn{
      width:100%;
      border:0;
      border-radius:12px;
      min-height:50px;
      padding:13px 16px;
      font-size:1.01rem;
      font-weight:700;
      color:#fff;
      background:var(--btn);
      cursor:pointer;
    }
    .btn:active{transform:translateY(1px)}
    .btn:hover{background:var(--btnh)}
    .brand{
      margin-top:16px;
      color:var(--muted);
      font-size:.93rem;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }
    .brand a{
      color:#c7d2fe;
      text-decoration:none;
      border-bottom:1px dashed rgba(199,210,254,.55);
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .ig{width:15px;height:15px;display:inline-block}
    .tiny{
      margin-top:9px;
      color:#94a3b8;
      font-size:.78rem;
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-live="polite">
    <h1 id="headline">Thanks for visiting our shop!</h1>
    <p class="sub">We’re taking you to our Google Reviews page.</p>
    <p class="count" id="countText">Redirecting to Google Reviews in 3…</p>

    <div class="progress" aria-hidden="true">
      <div id="bar" class="bar"></div>
    </div>

    <button id="skipBtn" class="btn" type="button">Skip / Continue Now →</button>

    <div class="brand">
      <span>Cards &amp; NFC tags by</span>
      <a id="igLink" href="https://instagram.com/adiloofm" target="_blank" rel="noopener noreferrer">
        <svg class="ig" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2"></rect>
          <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"></circle>
          <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor"></circle>
        </svg>
        adiloofm
      </a>
    </div>

    <p class="tiny" id="hint"></p>
  </main>

  <script>
    (function () {
      // =========================
      // CONFIG
      // =========================
      const REDIRECT_SECONDS = 3.5; // auto redirect delay
      const ANALYTICS_WEBHOOK = "https://script.google.com/macros/s/AKfycbz8QPtLuBujD19svvJMTJaTNIIBndjbBcjIpELB6G6Tbeqa0Kj58P35Mnu-B1qDe3Mb/exec";
      const ANALYTICS_TOKEN = "adiloofm_analytics_v1_9f3c7e2b4a1d6c8f0b5e9a2d7c4f1b8e6a3d0c9f5b2e7a1d4c8f6b0e3a9d2f";

      const DEFAULT_SHOP_NAME = "our shop";
      const DEFAULT_REVIEW_URL = "https://www.google.com/maps";

      // Optional ID lookup map. You can fill SP1..SP50 here.
      // If ?shop and ?link are passed, they override this map.
      const SHOP_LOOKUP = {
        "SP1": { shop: "Shop 1", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP1" },
        "SP2": { shop: "Shop 2", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP2" },
        "SP3": { shop: "Shop 3", link: "https://search.google.com/local/writereview?placeid=PLACE_ID_SP3" }
      };

      // =========================
      // PARAM READ
      // =========================
      const qs = new URLSearchParams(window.location.search);
      const id = (qs.get("id") || "").trim();
      let shopName = (qs.get("shop") || "").trim();
      let reviewUrl = (qs.get("link") || "").trim();

      // fallback to lookup by id
      if ((!shopName || !reviewUrl) && id && SHOP_LOOKUP[id]) {
        shopName = SHOP_LOOKUP[id].shop || shopName;
        reviewUrl = SHOP_LOOKUP[id].link || reviewUrl;
      }

      if (!shopName) shopName = DEFAULT_SHOP_NAME;

      // URL safety
      function safeHttpUrl(v) {
        try {
          const u = new URL(v);
          return (u.protocol === "https:" || u.protocol === "http:") ? u.toString() : null;
        } catch (_) {
          return null;
        }
      }
      reviewUrl = safeHttpUrl(reviewUrl) || DEFAULT_REVIEW_URL;

      // =========================
      // UI
      // =========================
      const headline = document.getElementById("headline");
      const countText = document.getElementById("countText");
      const bar = document.getElementById("bar");
      const skipBtn = document.getElementById("skipBtn");
      const igLink = document.getElementById("igLink");
      const hint = document.getElementById("hint");

      headline.textContent = `Thanks for visiting ${shopName}!`;

      if (!qs.get("shop") && !qs.get("link") && !id) {
        hint.textContent = "Tip: use ?shop=ShopName&link=https://... or ?id=SP1";
      }

      // progress animation
      bar.style.transitionDuration = `${REDIRECT_SECONDS}s`;
      requestAnimationFrame(() => { bar.style.transform = "scaleX(0)"; });

      let secondsLeft = Math.ceil(REDIRECT_SECONDS);
      countText.textContent = `Redirecting to Google Reviews in ${secondsLeft}…`;

      const countdownTimer = setInterval(() => {
        secondsLeft -= 1;
        if (secondsLeft > 0) {
          countText.textContent = `Redirecting to Google Reviews in ${secondsLeft}…`;
        } else {
          countText.textContent = "Redirecting now…";
          clearInterval(countdownTimer);
        }
      }, 1000);

      // =========================
      // ANALYTICS
      // =========================
      function trackEvent(payload) {
        if (!ANALYTICS_WEBHOOK) return;

        const body = {
          timestamp: new Date().toISOString(),
          token: ANALYTICS_TOKEN,
          event: payload.event || "",
          shopId: id || "",
          shopName: shopName || "",
          target: payload.target || "",
          userAgent: navigator.userAgent || "",
          referrer: document.referrer || ""
        };

        // fire-and-forget
        fetch(ANALYTICS_WEBHOOK, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          keepalive: true
        }).catch(() => {});
      }

      // =========================
      // REDIRECT FLOW
      // =========================
      let redirected = false;
      function redirectNow(source) {
        if (redirected) return;
        redirected = true;

        clearInterval(countdownTimer);

        trackEvent({
          event: "shop_redirect",
          target: reviewUrl,
          source: source || "auto"
        });

        // tiny delay helps fire analytics request first
        setTimeout(() => {
          window.location.href = reviewUrl;
        }, 120);
      }

      const autoTimer = setTimeout(() => redirectNow("auto"), REDIRECT_SECONDS * 1000);
      skipBtn.addEventListener("click", () => redirectNow("skip_button"));
      window.addEventListener("pagehide", () => clearTimeout(autoTimer));

      // =========================
      // INSTAGRAM LINK (deeplink + fallback)
      // =========================
      igLink.addEventListener("click", function (e) {
        e.preventDefault();

        trackEvent({
          event: "profile_click",
          target: "https://instagram.com/adiloofm"
        });

        const appUrl = "instagram://user?username=adiloofm";
        const webUrl = "https://instagram.com/adiloofm";

        // attempt app
        window.location.href = appUrl;

        // fallback to web
        setTimeout(() => {
          window.open(webUrl, "_blank", "noopener,noreferrer");
        }, 800);
      });
    })();
  </script>
</body>
</html>
