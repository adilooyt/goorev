<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Goorev Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-132Q7QN63G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-132Q7QN63G');
  </script>
  <style>
    :root {
      --bg:      #0b1120;
      --surface: #111827;
      --surface2:#1e293b;
      --border:  rgba(255,255,255,.08);
      --text:    #f1f5f9;
      --muted:   #64748b;
      --accent:  #22c55e;
      --blue:    #3b82f6;
      --purple:  #a855f7;
      --orange:  #f97316;
      --red:     #ef4444;
      --radius:  16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── Header ── */
    header {
      max-width: 1200px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .2px; }
    header p  { font-size: .85rem; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── Config bar ── */
    .config-bar {
      max-width: 1200px;
      margin: 0 auto 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .config-bar label { font-size: .8rem; color: var(--muted); white-space: nowrap; }
    .config-bar input {
      flex: 1;
      min-width: 260px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .88rem;
      padding: 8px 12px;
      outline: none;
    }
    .config-bar input:focus { border-color: var(--blue); }

    /* ── Buttons ── */
    button {
      border: 0; border-radius: 8px; font-size: .88rem; font-weight: 600;
      cursor: pointer; padding: 9px 16px; transition: background .15s;
    }
    button:active { transform: translateY(1px); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: #273549; }
    button:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Grid ── */
    .wrap { max-width: 1200px; margin: 0 auto; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--kpi-color, var(--accent));
    }
    .kpi-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .kpi-value { font-size: 2rem; font-weight: 800; line-height: 1; }
    .kpi-sub   { font-size: .78rem; color: var(--muted); margin-top: 6px; }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .chart-full { grid-column: 1 / -1; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: .85rem;
      font-weight: 700;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .chart-wrap { position: relative; height: 220px; }
    .chart-wrap-lg { position: relative; height: 200px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-weight: 600;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: rgba(255,255,255,.03); }
    .badge {
      display: inline-block;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: .72rem;
      font-weight: 700;
    }
    .badge-green  { background: rgba(34,197,94,.15);  color: #4ade80; }
    .badge-blue   { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-purple { background: rgba(168,85,247,.15); color: #c084fc; }
    .badge-orange { background: rgba(249,115,22,.15); color: #fb923c; }

    /* ── State ── */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: .92rem;
    }
    #loadState {
      max-width: 1200px;
      margin: 0 auto 20px;
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      min-height: 24px;
    }

    /* ── Last updated ── */
    .last-updated { font-size: .75rem; color: var(--muted); }

    @media(max-width: 600px) {
      .kpi-value { font-size: 1.6rem; }
      .chart-wrap { height: 180px; }
    }
  </style>
</head>
<body>

<!-- Config -->
<div class="config-bar">
  <label for="webhookUrl">Apps Script URL</label>
  <input id="webhookUrl" type="text" placeholder="https://script.google.com/macros/s/.../exec" spellcheck="false" />
  <button class="btn-primary" id="loadBtn" onclick="loadData()">Load data</button>
  <button class="btn-ghost" onclick="saveUrl()">Save URL</button>
</div>

<div class="wrap">

  <header>
    <div>
      <h1>Goorev Analytics</h1>
      <p id="lastUpdated" class="last-updated">Not loaded yet</p>
    </div>
    <div class="header-right">
      <button class="btn-ghost" id="refreshBtn" onclick="loadData()" disabled>↻ Refresh</button>
    </div>
  </header>

  <div id="loadState">Enter your Apps Script URL above and click Load data.</div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid" style="display:none">
    <div class="kpi" style="--kpi-color:var(--accent)">
      <div class="kpi-label">Total Taps</div>
      <div class="kpi-value" id="kpiTotal">—</div>
      <div class="kpi-sub" id="kpiTotalSub"></div>
    </div>
    <div class="kpi" style="--kpi-color:var(--blue)">
      <div class="kpi-label">Unique Shops</div>
      <div class="kpi-value" id="kpiShops">—</div>
      <div class="kpi-sub" id="kpiShopsSub"></div>
    </div>
    <div class="kpi" style="--kpi-color:var(--purple)">
      <div class="kpi-label">Today</div>
      <div class="kpi-value" id="kpiToday">—</div>
      <div class="kpi-sub">taps today</div>
    </div>
    <div class="kpi" style="--kpi-color:var(--orange)">
      <div class="kpi-label">Auto Redirects</div>
      <div class="kpi-value" id="kpiAuto">—</div>
      <div class="kpi-sub" id="kpiAutoSub"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-grid" id="chartGrid" style="display:none">

    <!-- Taps over time -->
    <div class="card chart-full">
      <div class="card-title"><span class="dot" style="background:var(--blue)"></span>Taps Over Time</div>
      <div class="chart-wrap-lg"><canvas id="chartTimeline"></canvas></div>
    </div>

    <!-- By shop -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent)"></span>Taps by Shop</div>
      <div class="chart-wrap"><canvas id="chartShop"></canvas></div>
    </div>

    <!-- By source -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--purple)"></span>Redirect Source</div>
      <div class="chart-wrap"><canvas id="chartSource"></canvas></div>
    </div>

    <!-- By event -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--orange)"></span>Event Types</div>
      <div class="chart-wrap"><canvas id="chartEvent"></canvas></div>
    </div>

    <!-- Recent events table -->
    <div class="card chart-full">
      <div class="card-title"><span class="dot" style="background:var(--muted)"></span>Recent Events</div>
      <div class="table-wrap" id="tableWrap">
        <p class="empty">No data</p>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  const STORAGE_KEY = 'goorev_dashboard_url';
  let charts = {};

  // ── Palette ──
  const COLORS = ['#22c55e','#3b82f6','#a855f7','#f97316','#ef4444','#06b6d4','#eab308','#ec4899'];

  // ── Persist URL ──
  function saveUrl() {
    const v = document.getElementById('webhookUrl').value.trim();
    if (v) localStorage.setItem(STORAGE_KEY, v);
    showState('URL saved.', 1500);
  }
  window.saveUrl = saveUrl;

  function loadStoredUrl() {
    const v = localStorage.getItem(STORAGE_KEY) || '';
    document.getElementById('webhookUrl').value = v;
  }

  function getUrl() {
    return document.getElementById('webhookUrl').value.trim();
  }

  // ── Load ──
  window.loadData = async function () {
    const url = getUrl();
    if (!url) { showState('Please enter your Apps Script URL.'); return; }

    const btn = document.getElementById('loadBtn');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    showState('Fetching data…');

    try {
      const res  = await fetch(url + '?action=data', { cache: 'no-store' });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'unknown error');
      const rows = json.rows || [];
      if (rows.length === 0) {
        showState('No events recorded yet. Tap your NFC tag to start tracking.');
        hide();
      } else {
        render(rows);
        document.getElementById('lastUpdated').textContent =
          'Last updated: ' + new Date().toLocaleTimeString();
        document.getElementById('refreshBtn').disabled = false;
        showState('');
      }
      localStorage.setItem(STORAGE_KEY, url);
    } catch (e) {
      showState('Error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load data';
    }
  };

  function hide() {
    document.getElementById('kpiGrid').style.display  = 'none';
    document.getElementById('chartGrid').style.display = 'none';
  }

  function show() {
    document.getElementById('kpiGrid').style.display  = '';
    document.getElementById('chartGrid').style.display = '';
  }

  // ── Render everything ──
  function render(rows) {
    show();

    // Normalise timestamps
    rows.forEach(r => {
      r._date = new Date(r.ts_server || r.ts_client || '');
    });

    // ── KPIs ──
    const total   = rows.length;
    const shops   = new Set(rows.map(r => r.shop_id).filter(Boolean));
    const today   = rows.filter(r => isSameDay(r._date, new Date())).length;
    const autoC   = rows.filter(r => r.source === 'auto').length;
    const autoPct = total ? Math.round(autoC / total * 100) : 0;
    const topShop = topKey(rows, 'shop_id');

    document.getElementById('kpiTotal').textContent    = total;
    document.getElementById('kpiTotalSub').textContent = 'all time';
    document.getElementById('kpiShops').textContent    = shops.size;
    document.getElementById('kpiShopsSub').textContent = topShop ? `top: ${topShop}` : '';
    document.getElementById('kpiToday').textContent    = today;
    document.getElementById('kpiAuto').textContent     = autoC;
    document.getElementById('kpiAutoSub').textContent  = `${autoPct}% of taps`;

    // ── Timeline (last 14 days) ──
    const dayMap = {};
    const now = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      dayMap[fmtDay(d)] = 0;
    }
    rows.forEach(r => {
      const k = fmtDay(r._date);
      if (k in dayMap) dayMap[k]++;
    });
    renderLine('chartTimeline', Object.keys(dayMap), Object.values(dayMap));

    // ── By shop ──
    const shopMap = countBy(rows, 'shop_id');
    renderDoughnut('chartShop', shopMap);

    // ── By source ──
    const srcMap = countBy(rows, 'source');
    renderPie('chartSource', srcMap);

    // ── By event ──
    const evtMap = countBy(rows, 'event');
    renderBar('chartEvent', evtMap);

    // ── Table ──
    renderTable(rows.slice().reverse().slice(0, 50));
  }

  // ── Chart helpers ──
  function destroyChart(id) {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  }

  function chartDefaults() {
    return {
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 12 } } },
        tooltip: { backgroundColor: '#1e293b', titleColor: '#f1f5f9', bodyColor: '#cbd5e1', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1 }
      }
    };
  }

  function renderLine(id, labels, data) {
    destroyChart(id);
    const ctx = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Taps',
          data,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,.12)',
          fill: true,
          tension: .4,
          pointRadius: 4,
          pointBackgroundColor: '#3b82f6'
        }]
      },
      options: {
        ...chartDefaults(),
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { ticks: { color: '#64748b', maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.05)' } },
          y: { ticks: { color: '#64748b', stepSize: 1 }, grid: { color: 'rgba(255,255,255,.05)' }, beginAtZero: true }
        }
      }
    });
  }

  function renderDoughnut(id, map) {
    destroyChart(id);
    const keys = Object.keys(map);
    const vals = Object.values(map);
    const ctx  = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: keys.map(k => k || '(none)'),
        datasets: [{ data: vals, backgroundColor: COLORS, borderWidth: 2, borderColor: '#111827' }]
      },
      options: {
        ...chartDefaults(),
        responsive: true,
        maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
          ...chartDefaults().plugins,
          legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, padding: 14 } }
        }
      }
    });
  }

  function renderPie(id, map) {
    destroyChart(id);
    const keys = Object.keys(map);
    const vals = Object.values(map);
    const ctx  = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: keys.map(k => k || '(none)'),
        datasets: [{ data: vals, backgroundColor: [COLORS[2], COLORS[3], COLORS[4], COLORS[5]], borderWidth: 2, borderColor: '#111827' }]
      },
      options: {
        ...chartDefaults(),
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          ...chartDefaults().plugins,
          legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, padding: 14 } }
        }
      }
    });
  }

  function renderBar(id, map) {
    destroyChart(id);
    const keys = Object.keys(map);
    const vals = Object.values(map);
    const ctx  = document.getElementById(id).getContext('2d');
    charts[id] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: keys.map(k => k || '(none)'),
        datasets: [{
          label: 'Count',
          data: vals,
          backgroundColor: keys.map((_, i) => COLORS[i % COLORS.length]),
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        ...chartDefaults(),
        responsive: true,
        maintainAspectRatio: false,
        plugins: { ...chartDefaults().plugins, legend: { display: false } },
        scales: {
          x: { ticks: { color: '#64748b' }, grid: { display: false } },
          y: { ticks: { color: '#64748b', stepSize: 1 }, grid: { color: 'rgba(255,255,255,.05)' }, beginAtZero: true }
        }
      }
    });
  }

  // ── Table ──
  function renderTable(rows) {
    const wrap = document.getElementById('tableWrap');
    if (!rows.length) { wrap.innerHTML = '<p class="empty">No events yet.</p>'; return; }

    const srcBadge = s => {
      const map = { auto: 'badge-green', skip_button: 'badge-blue', instagram_link: 'badge-purple' };
      return `<span class="badge ${map[s] || 'badge-orange'}">${s || '—'}</span>`;
    };
    const evtBadge = e => {
      const map = { shop_redirect: 'badge-green', profile_click: 'badge-purple' };
      return `<span class="badge ${map[e] || 'badge-blue'}">${e || '—'}</span>`;
    };

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Event</th>
            <th>Shop</th>
            <th>Source</th>
            <th>Resolution</th>
            <th>Target</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${fmtTime(new Date(r.ts_server || r.ts_client || ''))}</td>
              <td>${evtBadge(r.event)}</td>
              <td>${escHtml(r.shop_id || '—')}</td>
              <td>${srcBadge(r.source)}</td>
              <td>${escHtml(r.resolution || '—')}</td>
              <td>${escHtml(r.target_host || '—')}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // ── Utilities ──
  function countBy(rows, key) {
    return rows.reduce((acc, r) => {
      const k = r[key] || '';
      acc[k] = (acc[k] || 0) + 1;
      return acc;
    }, {});
  }

  function topKey(rows, key) {
    const m = countBy(rows, key);
    return Object.entries(m).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
  }

  function isSameDay(d1, d2) {
    return d1.getFullYear() === d2.getFullYear() &&
           d1.getMonth()    === d2.getMonth()    &&
           d1.getDate()     === d2.getDate();
  }

  function fmtDay(d) {
    if (isNaN(d)) return '?';
    return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
  }

  function fmtTime(d) {
    if (isNaN(d)) return '—';
    return d.toLocaleString('en-GB', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showState(msg, autohide) {
    const el = document.getElementById('loadState');
    el.textContent = msg;
    if (autohide) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, autohide);
  }

  // ── Init ──
  loadStoredUrl();
  Chart.defaults.color = '#94a3b8';
})();
</script>
</body>
</html>
